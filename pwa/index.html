<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Kehilla Call</title>
<link rel="manifest" href="manifest.json">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #0d1b2a;
  --card: #1b2f45;
  --gold: #c9982e;
  --green: #2e7d32;
  --green-light: #4caf50;
  --red: #c62828;
  --red-light: #ef5350;
  --white: #ffffff;
  --soft: rgba(255,255,255,0.75);
  --border: rgba(201,152,46,0.4);
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  font-family: Georgia, serif;
  touch-action: manipulation;
}

#app {
  width: 100vw; height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}

/* ── SCREENS ── */
.screen {
  display: none;
  width: 100%; height: 100%;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.screen.active { display: flex; }

/* ── HOME ── */
#home { gap: 14px; }

.greeting {
  font-size: 26px;
  color: var(--gold);
  text-align: center;
  font-weight: normal;
}

.contacts-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  width: 100%;
  max-width: 440px;
}

.contact-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 18px;
  padding: 16px 10px 14px;
  gap: 8px;
  cursor: pointer;
  min-height: 140px;
  user-select: none;
  transition: transform 0.1s, border-color 0.1s;
}

.contact-btn:active {
  transform: scale(0.94);
  border-color: var(--gold);
}

.contact-avatar {
  width: 72px; height: 72px;
  border-radius: 50%;
  border: 2.5px solid var(--gold);
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  background: #1e3a5f;
  font-size: 26px;
  color: var(--gold);
  font-weight: bold;
  flex-shrink: 0;
}

.contact-avatar img {
  width: 100%; height: 100%; object-fit: cover;
}

.contact-name {
  font-size: 17px;
  color: var(--white);
  text-align: center;
  font-weight: bold;
}

.contact-rel {
  font-size: 12px;
  color: var(--gold);
  text-align: center;
  font-style: italic;
}

.play-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #0a2010;
  border: 2px solid var(--green-light);
  border-radius: 18px;
  padding: 16px 10px 14px;
  cursor: pointer;
  min-height: 140px;
  gap: 8px;
  user-select: none;
  transition: transform 0.1s;
}
.play-btn:active { transform: scale(0.94); }
.play-icon { font-size: 48px; line-height: 1; }
.play-label { font-size: 17px; color: var(--green-light); font-weight: bold; }

/* ── CALLING ── */
#calling { gap: 20px; }

.big-avatar {
  width: 150px; height: 150px;
  border-radius: 50%;
  border: 4px solid var(--gold);
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  background: #1e3a5f;
  font-size: 60px;
  color: var(--gold);
  font-weight: bold;
}
.big-avatar img { width: 100%; height: 100%; object-fit: cover; }

.big-name {
  font-size: 38px;
  color: var(--white);
  font-weight: bold;
  text-align: center;
}

.big-rel {
  font-size: 16px;
  color: var(--gold);
  font-style: italic;
}

.calling-status {
  font-size: 18px;
  color: var(--soft);
  animation: pulse 1.5s infinite;
}

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.hangup {
  width: 86px; height: 86px;
  border-radius: 50%;
  background: var(--red);
  border: none;
  font-size: 32px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  margin-top: 10px;
  transition: transform 0.1s;
}
.hangup:active { transform: scale(0.9); }

/* ── INCOMING ── */
#incoming { gap: 22px; }

.incoming-label {
  font-size: 20px;
  color: var(--soft);
  text-transform: uppercase;
  letter-spacing: 2px;
}

.incoming-announce {
  font-size: 22px;
  color: var(--gold);
  text-align: center;
  padding: 0 20px;
  font-style: italic;
}

.answer-row {
  display: flex;
  gap: 50px;
  margin-top: 10px;
}

.answer-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  user-select: none;
}

.answer-circle {
  width: 96px; height: 96px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 42px;
  transition: transform 0.1s;
  border: none;
  cursor: pointer;
}
.answer-circle:active { transform: scale(0.9); }
.yes-circle { background: var(--green); }
.no-circle  { background: var(--red); }

.answer-label {
  font-size: 22px;
  font-weight: bold;
  color: var(--white);
}

/* ── LOADING ── */
#loading { gap: 16px; }
.loading-text { font-size: 20px; color: var(--soft); }
.spinner {
  width: 48px; height: 48px;
  border: 4px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="app">

  <!-- LOADING -->
  <div id="loading" class="screen active">
    <div class="spinner"></div>
    <div class="loading-text">Loading...</div>
  </div>

  <!-- HOME -->
  <div id="home" class="screen">
    <div class="greeting" id="greeting">Good morning ☀️</div>
    <div class="contacts-grid" id="contacts-grid"></div>
  </div>

  <!-- CALLING -->
  <div id="calling" class="screen">
    <div class="big-avatar" id="calling-avatar"></div>
    <div class="big-name" id="calling-name"></div>
    <div class="big-rel" id="calling-rel"></div>
    <div class="calling-status" id="calling-status">Calling...</div>
    <button class="hangup" onclick="goHome()">📵</button>
  </div>

  <!-- INCOMING -->
  <div id="incoming" class="screen">
    <div class="incoming-label">Someone is calling you</div>
    <div class="big-avatar" id="incoming-avatar"></div>
    <div class="big-name" id="incoming-name"></div>
    <div class="incoming-announce" id="incoming-announce"></div>
    <div class="answer-row">
      <div class="answer-btn" onclick="answerCall()">
        <div class="answer-circle yes-circle">✓</div>
        <div class="answer-label">YES</div>
      </div>
      <div class="answer-btn" onclick="declineCall()">
        <div class="answer-circle no-circle">✗</div>
        <div class="answer-label">NO</div>
      </div>
    </div>
  </div>

</div>

<script>
const SUPABASE_URL = 'https://setbeaotudtmpciyivsl.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNldGJlYW90dWR0bXBjaXlpdnNsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzNjMxMDMsImV4cCI6MjA5NTkzOTEwM30.rfGvm0blhnU5P2Cl4dM4OuUk0YvbI-M3dFYJRz1tWUw';

// Get device token from URL: kehillacall.app/device/TOKEN
const token = new URLSearchParams(window.location.search).get('t') || 
              window.location.pathname.split('/').pop();

let lovedOne = null;
let contacts = [];
let pollInterval = null;

// ── SUPABASE FETCH ────────────────────────────────────────────────────────────
async function sbFetch(path) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: {
      'apikey': SUPABASE_ANON,
      'Authorization': `Bearer ${SUPABASE_ANON}`,
      'Content-Type': 'application/json'
    }
  });
  return r.json();
}

// ── LOAD DATA ─────────────────────────────────────────────────────────────────
async function loadData() {
  try {
    // Get loved one by device token
    const lo = await sbFetch(`loved_ones?device_token=eq.${token}&select=*`);
    if (!lo || !lo[0]) { showError(); return; }
    lovedOne = lo[0];

    // Get active contacts ordered by display_order
    const c = await sbFetch(
      `contacts?loved_one_id=eq.${lovedOne.id}&active=eq.true&order=display_order.asc&select=*`
    );
    contacts = c || [];

    buildHome();
    showScreen('home');
  } catch(e) {
    showError();
  }
}

// ── BUILD HOME ────────────────────────────────────────────────────────────────
function buildHome() {
  // Greeting
  const name = lovedOne.greeting_name || lovedOne.name;
  const h = new Date().getHours();
  const tod = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
  const emoji = h < 12 ? '☀️' : h < 17 ? '🌤️' : '🌙';
  document.getElementById('greeting').textContent = `${tod}, ${name} ${emoji}`;

  // Contacts grid
  const grid = document.getElementById('contacts-grid');
  grid.innerHTML = '';

  const count = Math.min(contacts.length, lovedOne.button_count || 6);
  contacts.slice(0, count).forEach(c => {
    const btn = document.createElement('div');
    btn.className = 'contact-btn';
    btn.onclick = () => callContact(c);

    const avatar = document.createElement('div');
    avatar.className = 'contact-avatar';
    if (c.photo_url) {
      avatar.innerHTML = `<img src="${c.photo_url}" alt="${c.name}">`;
    } else {
      avatar.textContent = (c.name || '?')[0].toUpperCase();
    }

    const nameEl = document.createElement('div');
    nameEl.className = 'contact-name';
    nameEl.textContent = c.name;

    btn.appendChild(avatar);
    btn.appendChild(nameEl);

    if (c.relationship) {
      const rel = document.createElement('div');
      rel.className = 'contact-rel';
      rel.textContent = c.relationship;
      btn.appendChild(rel);
    }

    grid.appendChild(btn);
  });

  // Play button
  if (lovedOne.game_package) {
    const play = document.createElement('div');
    play.className = 'play-btn';
    play.onclick = openGame;
    play.innerHTML = '<div class="play-icon">🎮</div><div class="play-label">PLAY</div>';
    grid.appendChild(play);
  }
}

// ── SCREENS ───────────────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() {
  speak('');
  showScreen('home');
  buildHome();
}

function showError() {
  document.getElementById('loading').querySelector('.loading-text').textContent =
    'Could not load. Please ask for help.';
}

// ── CALLING ───────────────────────────────────────────────────────────────────
function setAvatar(el, contact) {
  if (contact && contact.photo_url) {
    el.innerHTML = `<img src="${contact.photo_url}" alt="${contact.name}">`;
  } else {
    el.textContent = (contact?.name || '?')[0].toUpperCase();
  }
}

function callContact(contact) {
  setAvatar(document.getElementById('calling-avatar'), contact);
  document.getElementById('calling-name').textContent = contact.name;
  document.getElementById('calling-rel').textContent = contact.relationship || '';
  document.getElementById('calling-status').textContent = 'Calling...';

  showScreen('calling');
  speak(`Calling ${contact.name}`);

  setTimeout(() => {
    const phone = contact.phone.replace(/\D/g, '');
    if (contact.call_via === 'whatsapp') {
      window.location.href = `https://wa.me/${phone}`;
    } else {
      window.location.href = `tel:${contact.phone}`;
    }
  }, 1000);

  // Auto-return home after 45s
  setTimeout(goHome, 45000);
}

// ── INCOMING (simulated — real incoming via native dialer) ────────────────────
function showIncoming(name, relationship, photoUrl) {
  const avatar = document.getElementById('incoming-avatar');
  if (photoUrl) {
    avatar.innerHTML = `<img src="${photoUrl}" alt="${name}">`;
  } else {
    avatar.textContent = (name || '?')[0].toUpperCase();
  }
  document.getElementById('incoming-name').textContent = name;
  document.getElementById('incoming-announce').textContent = `It's ${name} calling`;

  showScreen('incoming');
  speak(`It's ${name} calling. Press the green button to answer, or the red button to decline.`);

  // Auto-decline after 30s
  setTimeout(() => {
    if (document.getElementById('incoming').classList.contains('active')) {
      declineCall();
    }
  }, 30000);
}

function answerCall() {
  speak('Answering');
  setTimeout(goHome, 800);
}

function declineCall() {
  speak('Declining call');
  setTimeout(goHome, 800);
}

// ── GAME ──────────────────────────────────────────────────────────────────────
function openGame() {
  speak('Opening your game');
  if (lovedOne.game_package) {
    window.location.href = `intent://#Intent;package=${lovedOne.game_package};scheme=android-app;end`;
  }
  setTimeout(goHome, 3000);
}

// ── SPEECH ────────────────────────────────────────────────────────────────────
function speak(text) {
  if (!text || !('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.82; u.pitch = 1.0; u.volume = 1.0;
  window.speechSynthesis.speak(u);
}

// ── RETURN HOME ON FOCUS ──────────────────────────────────────────────────────
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && lovedOne) setTimeout(goHome, 600);
});

// ── KEEP SCREEN ON ────────────────────────────────────────────────────────────
async function keepOn() {
  try {
    if ('wakeLock' in navigator) await navigator.wakeLock.request('screen');
  } catch(e) {}
}
keepOn();

// ── POLL FOR CONTACT UPDATES every 5 min ─────────────────────────────────────
setInterval(async () => {
  if (!lovedOne) return;
  const c = await sbFetch(
    `contacts?loved_one_id=eq.${lovedOne.id}&active=eq.true&order=display_order.asc&select=*`
  );
  if (c) { contacts = c; buildHome(); }
}, 5 * 60 * 1000);

// ── INIT ──────────────────────────────────────────────────────────────────────
if (!token || token === 'pwa') {
  document.getElementById('loading').querySelector('.loading-text').textContent =
    'No device token. Please use your personal link.';
} else {
  loadData();
}
</script>
</body>
</html>
